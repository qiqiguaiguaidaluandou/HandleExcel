# 部署用 compose（单文件）
# 用法：
#   docker compose up -d --build          # 构建并后台启动
#   docker compose logs -f                # 跟随日志
#   docker compose down                   # 停服务
#
# 启动前：
#   1. cd backend && cp .env.example .env，填好 DASHSCOPE_API_KEY
#   2. 项目根 .env 里的 SERVER_HOST 指向本机真实可访问 IP（默认已是 172.10.42.142）
#   3. 构建 executor 镜像（一次性）：
#      docker build -f docker/executor.Dockerfile -t handleexcel-executor:latest .

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: handleexcel-backend:latest
    container_name: handleexcel-backend
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - ./backend/.env
    environment:
      # 容器内视角的数据目录
      DATA_DIR: /data
      # 宿主视角的数据目录（executor 兄弟容器 -v 参数要用，docker daemon 解析的是宿主路径）
      HOST_DATA_DIR: ${PWD}/backend/data
      EXECUTOR_IMAGE: handleexcel-executor:latest
      # CORS 白名单：由 SERVER_HOST 自动拼出前端地址；覆盖 backend/.env 里的同名项
      ALLOWED_ORIGINS: http://${SERVER_HOST:-172.10.42.142}:3001
    volumes:
      - ./backend/data:/data
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* 必须 build 时注入，浏览器 bundle 里 API 基址就是这个
        NEXT_PUBLIC_API_BASE: http://${SERVER_HOST:-172.10.42.142}:8002
    image: handleexcel-frontend:latest
    container_name: handleexcel-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - backend
